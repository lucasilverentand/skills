name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Check marketplace.json is up to date
        run: bun run generate -- --check

      - name: Validate marketplace integrity
        run: bun run validate:marketplace

      - name: Validate skill metadata
        run: bun run validate:metadata

      - name: Validate skills
        run: bun run validate
