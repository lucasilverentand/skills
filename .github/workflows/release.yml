name: Release

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "scripts/**"
      - ".claude-plugin/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Determine version
        id: version
        run: |
          DATE=$(date -u +%Y.%m.%d)
          EXISTING=$(git tag -l "${DATE}*" | sort -V | tail -1)
          if [ -z "$EXISTING" ]; then
            VERSION="$DATE"
          elif [ "$EXISTING" = "$DATE" ]; then
            VERSION="${DATE}.1"
          else
            SUFFIX="${EXISTING##*.}"
            NEXT=$((SUFFIX + 1))
            VERSION="${DATE}.${NEXT}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${VERSION}"

      - name: Generate marketplace with release version
        run: bun run generate -- --version ${{ steps.version.outputs.version }}

      - name: Validate
        run: bun run validate

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          {
            echo "notes<<EOF"
            git log --pretty=format:"- %s (%h)" "$RANGE"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "No marketplace changes to commit"
          else
            git commit -m "chore: release ${{ steps.version.outputs.version }} [skip ci]"
          fi
          git tag "${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes "${{ steps.notes.outputs.notes }}"
